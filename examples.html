
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RESPIN DID – Dialect Examples</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
font-family:system-ui,Segoe UI,Roboto;
margin:30px;
background:#fafafa;
}

.language-btn {
display:block;
width:100%;
padding:15px;
margin-top:10px;
font-size:18px;
border:none;
border-radius:8px;
background:#2c7be5;
color:white;
cursor:pointer;
}

.lang-section {
display:none;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-top:10px;
}

table {
border-collapse:collapse;
width:100%;
}

th,td {
border:1px solid #ddd;
padding:8px;
}

th {
background:#f3f4f6;
}

audio {
width:260px;
}

.d1 {background:#e8f2ff}
.d2 {background:#e8fff2}
.d3 {background:#fff6e8}
.d4 {background:#fde8ff}
.d5 {background:#e8fbff}

</style>

</head>

<body>

<h1>RESPIN DID – Dialect Examples</h1>
<p>Short web-playable clips (MP3, 16 kHz mono). Use headphones.</p>



<script>

function toggleLang(lang){
let section=document.getElementById(lang)

if(section.style.display==="block")
section.style.display="none"
else
section.style.display="block"

}

</script>

</body>
</html>
